# profiles/aetheros/grub/grub.cfg
# GRUB for aetherOS UEFI live (archiso substitution tokens expanded by mkarchiso)
# Kernel lives at /%INSTALL_DIR%/boot/%ARCH%/ not /boot/ (LT-3 finding 2026-07-11)

# Load partition table and file system modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output console
fi

# Serial for headless smoke / debugging
insmod serial
if serial --unit=0 --speed=115200; then
    terminal_input --append serial
    terminal_output --append serial
fi

if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

default=aetheros
timeout=5
timeout_style=menu

menuentry "aetherOS Live (%ARCH%, ${archiso_platform})" --class aetheros --class gnu-linux --class os --id 'aetheros' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% console=tty0 console=ttyS0,115200
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
}

