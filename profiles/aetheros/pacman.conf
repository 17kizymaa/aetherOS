# aetherOS ISO profile pacman.conf
# Used by mkarchiso/pacstrap. Mirrorlist is the *host* file at build time.
# Do NOT invent a [Include] repository — that becomes literal repo name "Include"
# and yields Include.db 404s (LT-2 finding 2026-07-11).

[options]
HoldPkg = pacman glibc
Architecture = auto
CheckSpace
Color
ILoveCandy
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
